[program:brave]
command=/usr/bin/brave-browser \
	--no-sandbox \
	--disable-dev-shm-usage \
	--disable-gpu \
	--disable-features=UseOzonePlatform \
	--start-maximized \
	--no-first-run \
	--no-default-browser-check \
	--password-store=basic \
	--disable-logging \
	--disable-breakpad \
	--disable-component-update \
	%(ENV_BROWSER_OPTIONS)s \
	%(ENV_STARTING_WEBSITE_URL)s
autostart=%(ENV_AUTO_START_BROWSER)s
autorestart=true
stdout_logfile=/var/log/supervisor/brave.log
stderr_logfile=/var/log/supervisor/brave_error.log
priority=20
